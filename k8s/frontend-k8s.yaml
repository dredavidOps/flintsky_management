# Frontend Deployment for Kubernetes
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: propertymgmt-frontend:local
        imagePullPolicy: Never
        ports:
          - containerPort: 80
        env:
          - name: VITE_API_URL
            value: "http://localhost:8080/api"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30001
  selector:
    app: frontend
